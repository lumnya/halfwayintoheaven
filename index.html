<link rel="icon" href="favicon.svg" type="image/svg+xml">

<style>
  :root {
    --bg: #0b1411;
    --accent: #d98aab;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    font-family: 'Times New Roman', Times, serif;
    background-color: var(--bg);
  }

  /* Background image */
  body::before {
    content: "";
    position: fixed;
    inset: 0;

    background-image: url("https://raw.githubusercontent.com/lumnya/halfwayintoheaven/main/1.png");
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;

    z-index: -2;
  }

  /* Subtle dark overlay */
  body::after {
    content: "";
    position: fixed;
    inset: 0;

    background: rgba(0, 0, 0, 0.12);

    z-index: -1;
  }

  ::selection {
    background: var(--accent);
    color: var(--bg);
  }

  nav {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    text-align: right;
    z-index: 10;
  }

  nav ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  nav li {
    margin: 0.4rem 0;
  }

  nav a {
    color: var(--accent);
    text-decoration: underline;
    font-size: 1.15rem;
    text-shadow:
      0 0 8px rgba(0,0,0,0.9),
      0 0 20px rgba(0,0,0,0.7);
    transition: opacity 0.2s ease;
  }

  nav a:hover {
    opacity: 0.75;
  }

  /* Mobile */
  @media (max-width: 768px) {
    nav {
      top: auto;
      bottom: 12vh;
      right: 1.2rem;
      transform: none;
    }

    nav li {
      margin: 0.6rem 0;
    }

    nav a {
      font-size: 1.35rem;
    }

    body::after {
      background: rgba(0, 0, 0, 0.16);
    }
  }
</style>
</head>
